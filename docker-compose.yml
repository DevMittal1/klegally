version: "3.8"

services:
  api:
    build:
      context: .
      dockerfile: infra/Dockerfile.api
    container_name: klegally-api
    ports:
      - "8000:8000"
    environment:
      - HOST=0.0.0.0
      - PORT=8000
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - klegally-network

  worker:
    build:
      context: .
      dockerfile: infra/Dockerfile.worker
    container_name: klegally-worker
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - klegally-network

  ingestion-worker:
    build:
      context: .
      dockerfile: infra/Dockerfile.worker
    container_name: klegally-ingestion-worker
    command: ["python", "main_ingestion.py"]
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - klegally-network

networks:
  klegally-network:
    driver: bridge
