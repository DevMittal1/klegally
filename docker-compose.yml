version: "3.8"

services:
  api:
    build:
      context: .
      dockerfile: infra/Dockerfile.api
    container_name: klegally-api
    ports:
      - "8000:8000"
    environment:
      - HOST=0.0.0.0
      - PORT=8000
      - MONGODB_URL=mongodb://host.docker.internal:27017
      - REDIS_URL=redis://host.docker.internal:6379
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - klegally-network

  worker:
    build:
      context: .
      dockerfile: infra/Dockerfile.worker
    container_name: klegally-worker
    environment:
      - REDIS_URL=redis://host.docker.internal:6379
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - klegally-network

networks:
  klegally-network:
    driver: bridge
